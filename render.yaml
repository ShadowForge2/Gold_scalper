services:
  - type: web
    name: gold-scalper
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: BROKER
        value: CAPITAL
      - key: CAPITAL_API_KEY
        sync: false
      - key: CAPITAL_IDENTIFIER
        sync: false
      - key: CAPITAL_PASSWORD
        sync: false
      - key: CAPITAL_DEMO
        value: "true"
      - key: CAPITAL_EPIC
        value: GOLD
      - key: SYMBOL
        value: XAUUSD
      - key: MAGIC_NUMBER
        value: "123456"
      - key: COMMENT
        value: Gold Scalper
      - key: LOT_SIZE
        value: "0.01"
      - key: MIN_LOT
        value: "0.01"
      - key: MAX_LOT
        value: "9999.00"
      - key: LOT_STEP
        value: "0.01"
      - key: LOT_MULTIPLIER
        value: "2"
      - key: SIGNAL_TIMEFRAME
        value: "1"
      - key: MAX_DAILY_LOSS_USD
        value: "10.00"
      - key: MAX_EVENT_LOSS_USD
        value: "20.00"
      - key: MAX_TRADES_PER_EVENT
        value: "10"
      - key: MAX_TRADES_PER_SESSION
        value: "10"
      - key: MAX_CONSECUTIVE_LOSSES
        value: "5"
      - key: RE_ENTRY_COOLDOWN_SEC
        value: "60"
      - key: BIAS_UPDATE_INTERVAL_SEC
        value: "60"
      - key: SIGNAL_ENTRY_THRESHOLD
        value: "0.10"
      - key: SL_ATR_MULTIPLIER
        value: "1.0"
      - key: TP1_MULTIPLIER
        value: "2.0"
      - key: TP2_MULTIPLIER
        value: "4.0"
      - key: TP3_MULTIPLIER
        value: "6.0"
      - key: ATR_MULTIPLIER
        value: "1.0"
      - key: TP_CLOSE_THRESHOLD
        value: "0.8"
      - key: TP_CLOSE_MOMENTUM_MIN
        value: "0.25"
      - key: EXIT_THRESHOLD_TIGHT
        value: "0.60"
      - key: MAX_SPREAD_PIPS
        value: "50.0"
      - key: MAX_SLIPPAGE_PIPS
        value: "10"
      - key: ASP_ENABLED
        value: "true"
      - key: ASP_TIMEOUT_BARS_XAUUSD
        value: "24"
      - key: ASP_TIMEOUT_BARS_US100
        value: "24"
      - key: ASP_SL_ATR_MULTIPLIER
        value: "2.0"
      - key: ASP_TP_ATR_MULTIPLIER
        value: "1.0"
      - key: ASP_MIN_ATR_DIST
        value: "0.50"
      - key: MIN_BALANCE
        value: "10.0"
      - key: MIN_VOLATILITY_PIPS
        value: "5.0"
      - key: MAX_VOLATILITY_PIPS
        value: "200.0"
      - key: ALLOWED_SESSIONS
        value: ASIA,LONDON,NEW_YORK
      - key: PEAK_HARVEST_TRAIL_TRIGGER
        value: "3.0"
      - key: PEAK_HARVEST_TRAIL_RETRACE
        value: "0.60"
      - key: PEAK_HARVEST_MIN_BARS_EXIT
        value: "15"
      - key: PEAK_HARVEST_MOMENTUM_THRESHOLD
        value: "0.90"
      - key: PEAK_HARVEST_MAX_HOLD_BARS
        value: "48"
      - key: USD_TO_NGN_RATE
        value: "1500"
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGINS
        value: https://gold-scalper-qyhg.onrender.com
